<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#d8ecff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="生命力日志" />
    <title>生命力日志</title>
    <link rel="icon" href="./icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./icon.svg" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="app-header" id="top">
      <div class="brand">
        <img class="brand-icon" src="./icon.svg" alt="" />
        <div>
          <p class="brand-kicker">LIFE LOG</p>
          <h1>生命力日志</h1>
        </div>
      </div>
      <p class="header-note">真实记录即可。空着，也是一种记录。</p>
    </header>

    <main class="app-shell">
      <section class="panel view active" id="today-view" aria-label="今日记录">
        <div class="date-row">
          <label for="entry-date">日期</label>
          <input id="entry-date" type="date" />
        </div>

        <nav class="section-index" id="section-index" aria-label="记录目录"></nav>

        <form id="log-form" autocomplete="off"></form>

        <section class="save-panel" id="save-panel">
          <div>
            <h2>保存</h2>
            <p id="save-status">今天的内容会先留在本机。</p>
            <p class="quiet-time" id="duration-label">今日记录用时：0 分钟</p>
          </div>
          <button class="primary-action" type="button" id="save-button">保存今日记录</button>
        </section>
      </section>

      <section class="panel view" id="history-view" aria-label="历史记录">
        <div class="view-heading">
          <h2>历史</h2>
          <p>按日期回看，也可以点开继续补充。</p>
        </div>
        <div id="history-list" class="history-list"></div>
      </section>

      <section class="panel view" id="review-view" aria-label="周复盘">
        <div class="view-heading">
          <h2>周复盘</h2>
          <p>基于最近 7 天的本地记录生成，不做诊断，只帮你看见。</p>
        </div>
        <div id="review-content" class="review-content"></div>
      </section>

      <section class="panel view" id="export-view" aria-label="导出记录">
        <div class="view-heading">
          <h2>导出</h2>
          <p>记录只保存在这台设备。建议每周导出一次备份。</p>
        </div>
        <div class="export-actions">
          <button type="button" id="export-json">导出 JSON</button>
          <button type="button" id="export-md">导出 Markdown</button>
        </div>
        <label class="import-box" for="import-file">
          <span>导入备份</span>
          <input id="import-file" type="file" accept="application/json,.json" />
        </label>
      </section>
    </main>

    <nav class="bottom-nav" aria-label="主导航">
      <button class="nav-button active" type="button" data-view="today-view">今日</button>
      <button class="nav-button" type="button" data-view="history-view">历史</button>
      <button class="nav-button" type="button" data-view="review-view">复盘</button>
      <button class="nav-button" type="button" data-view="export-view">导出</button>
    </nav>

    <script src="./app.js" defer></script>
  </body>
</html>
